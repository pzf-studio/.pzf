    <title>Glassmorphic Panel | SVG to HTML</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        /* Карточка-контейнер с эффектом свечения, чтобы подчеркнуть стиль "glassmorphic" */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 16px 20px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(2px);
        }

        /* SVG адаптивно масштабируется, сохраняя пропорции */
        svg {
            display: block;
            width: 100%;
            height: auto;
            max-width: 800px;
            margin: 0 auto;
            filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.2));
        }

        /* Небольшая адаптация для узких экранов */
        @media (max-width: 560px) {
            .glass-card {
                padding: 10px 12px;
            }
            body {
                padding: 12px;
            }
        }

        /* Улучшение читаемости: если вдруг SVG не прогрузится — подложка */
        .fallback-note {
            text-align: center;
            margin-top: 12px;
            color: rgba(255,255,240,0.5);
            font-size: 12px;
        }
    </style>
</head>
